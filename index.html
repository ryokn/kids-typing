<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>たのしいタイピング 🎹</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Hiragino Maru Gothic ProN', 'BIZ UDPGothic', 'Noto Sans JP', sans-serif;
      min-height: 100vh;
      background: #FFF8E7;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      overflow-x: hidden;
    }
    .screen { display:none; width:100%; max-width:900px; padding:14px 14px; flex-direction:column; align-items:center; gap:11px; }
    .screen.active { display:flex; }

    /* ── Shared ── */
    .btn {
      background: linear-gradient(145deg, #FFE066, #FFD700);
      border:none; border-radius:60px; padding:15px 46px;
      font-size: clamp(1.2rem,3.5vw,1.7rem); font-weight:900; color:#5a3800; cursor:pointer;
      box-shadow: 0 8px 0 #B8860B, 0 12px 26px rgba(0,0,0,.15);
      transition:all .12s; letter-spacing:2px;
    }
    .btn:hover  { transform:translateY(-2px); }
    .btn:active { transform:translateY(6px); box-shadow:0 2px 0 #B8860B; }

    .mascot {
      font-size: clamp(70px,13vw,105px);
      filter: drop-shadow(0 10px 18px rgba(0,0,0,.15));
      animation: float 3s ease-in-out infinite;
    }
    @keyframes float { 0%,100%{transform:translateY(0) rotate(-4deg)} 50%{transform:translateY(-16px) rotate(4deg)} }

    /* ══ START ══ */
    .title-big { font-size:clamp(1.9rem,5.5vw,3.1rem); font-weight:900; color:#5a3500; text-align:center; text-shadow:2px 2px 0 rgba(255,200,100,.5); }
    .title-sub { font-size:clamp(.9rem,2.5vw,1.2rem); color:#8a6a3a; text-align:center; }
    .rank-badge {
      display:flex; align-items:center; gap:10px;
      background:rgba(90,53,0,.1); border:2px solid rgba(90,53,0,.2);
      border-radius:50px; padding:9px 20px; color:#5a3500; font-size:1.05rem; font-weight:bold;
    }

    /* ══ LEVEL SELECT ══ */
    .xp-panel {
      width:100%; display:flex; align-items:center; gap:10px;
      background:rgba(90,53,0,.08); border:1px solid rgba(90,53,0,.15); border-radius:20px;
      padding:11px 16px;
    }
    .xp-rank-icon { font-size:2.3rem; }
    .xp-rank-info { min-width:80px; }
    .xp-rank-name { font-size:1rem; font-weight:900; color:#5a3500; }
    .xp-total     { font-size:.8rem; color:#8a6a3a; }
    .xp-bar-wrap  { flex:1; }
    .xp-bar-bg    { background:rgba(90,53,0,.12); border-radius:10px; height:11px; overflow:hidden; }
    .xp-bar-fill  { height:100%; border-radius:10px; background:linear-gradient(90deg,#FFD700,#FF6B6B); transition:width .8s cubic-bezier(.34,1.56,.64,1); }
    .xp-bar-label { font-size:.75rem; color:#8a6a3a; text-align:right; margin-top:2px; }

    .level-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(250px,1fr)); gap:10px; width:100%; }
    .level-card {
      border-radius:18px; padding:16px 18px; cursor:pointer;
      position:relative; overflow:hidden; border:none; text-align:left;
      box-shadow:0 5px 0 rgba(0,0,0,.2), 0 8px 22px rgba(0,0,0,.12);
      transition:transform .15s, box-shadow .15s;
    }
    .level-card:hover  { transform:translateY(-4px); box-shadow:0 9px 0 rgba(0,0,0,.2),0 14px 28px rgba(0,0,0,.16); }
    .level-card:active { transform:translateY(3px); box-shadow:0 2px 0 rgba(0,0,0,.2); }
    .lc-1 { background:linear-gradient(135deg,#43e97b,#38f9d7); }
    .lc-2 { background:linear-gradient(135deg,#4facfe,#00f2fe); }
    .lc-3 { background:linear-gradient(135deg,#f6d365,#fda085); }
    .lc-4 { background:linear-gradient(135deg,#f093fb,#f5576c); }
    .lc-5 { background:linear-gradient(135deg,#4776e6,#8e54e9); }
    .lc-5::after { content:'✨'; position:absolute; top:8px; right:10px; font-size:1.2rem; animation:spin 3s linear infinite; }
    @keyframes spin { to{transform:rotate(360deg)} }
    .lc-num  { font-size:2rem; font-weight:900; color:rgba(255,255,255,.95); line-height:1; }
    .lc-name { font-size:1.15rem; font-weight:900; color:white; margin:3px 0; }
    .lc-stars{ font-size:1rem; letter-spacing:2px; margin-bottom:5px; }
    .lc-info { font-size:.82rem; color:rgba(255,255,255,.88); font-weight:bold; }
    .btn-ghost { background:rgba(90,53,0,.1); color:#5a3500; box-shadow:none; border:2px solid rgba(90,53,0,.25); }
    .btn-ghost:hover  { background:rgba(90,53,0,.18); }
    .btn-ghost:active { transform:translateY(2px); }

    /* ══ GAME ══ */
    .top-bar { width:100%; display:flex; align-items:center; justify-content:space-between; color:#5a3500; }
    .stars-row { font-size:clamp(1.2rem,3.5vw,1.7rem); letter-spacing:3px; }
    .word-count { font-size:1.05rem; font-weight:bold; background:rgba(90,53,0,.1); padding:6px 14px; border-radius:16px; }
    .mute-btn { background:rgba(90,53,0,.1); border:none; border-radius:50%; width:36px; height:36px; font-size:1.2rem; cursor:pointer; transition:.2s; flex-shrink:0; }
    .mute-btn:hover { background:rgba(90,53,0,.18); }
    .back-btn { background:rgba(90,53,0,.1); border:none; border-radius:20px; padding:6px 12px; font-size:.95rem; font-weight:bold; color:#5a3500; cursor:pointer; transition:.2s; flex-shrink:0; display:flex; align-items:center; gap:4px; }
    .back-btn:hover { background:rgba(90,53,0,.18); }
    /* 確認ダイアログ */
    .confirm-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:10000; align-items:center; justify-content:center; }
    .confirm-overlay.show { display:flex; }
    .confirm-box { background:white; border-radius:24px; padding:28px 32px; text-align:center; box-shadow:0 20px 60px rgba(0,0,0,.25); animation:confirmPop .25s cubic-bezier(.34,1.56,.64,1); max-width:320px; width:90%; }
    @keyframes confirmPop { from{transform:scale(.7);opacity:0} to{transform:scale(1);opacity:1} }
    .confirm-icon { font-size:3rem; margin-bottom:8px; }
    .confirm-msg  { font-size:1.2rem; font-weight:bold; color:#333; margin-bottom:18px; line-height:1.4; }
    .confirm-btns { display:flex; gap:10px; justify-content:center; }
    .confirm-btns .btn { padding:12px 24px; font-size:1rem; }
    .btn-cancel { background:linear-gradient(145deg,#ccc,#aaa); box-shadow:0 5px 0 #888; color:#333; }
    .btn-cancel:active { box-shadow:0 1px 0 #888; }
    .progress-bar { width:100%; height:12px; background:rgba(90,53,0,.12); border-radius:20px; overflow:hidden; }
    .progress-fill { height:100%; background:linear-gradient(90deg,#FFD700,#FF6B6B); border-radius:20px; transition:width .5s cubic-bezier(.34,1.56,.64,1); }

    /* XP mini bar */
    .xp-mini { width:100%; display:flex; align-items:center; gap:7px; color:#8a6a3a; }
    .xp-mini-icon { font-size:1.35rem; }
    .xp-mini-bg   { flex:1; background:rgba(90,53,0,.12); border-radius:8px; height:9px; overflow:hidden; }
    .xp-mini-fill { height:100%; background:linear-gradient(90deg,#ffe066,#ff6b6b); border-radius:8px; transition:width .5s; }
    .xp-mini-lbl  { font-size:.8rem; white-space:nowrap; }

    /* Word card */
    .word-card {
      background:white; border-radius:24px; padding:18px 20px; width:100%; text-align:center;
      box-shadow:0 12px 34px rgba(0,0,0,.18); position:relative; overflow:hidden;
    }
    .word-card::before { content:''; position:absolute; top:0; left:0; right:0; height:5px; background:linear-gradient(90deg,#667eea,#f64f59,#FFD700); }
    .word-emoji { font-size:clamp(60px,11vw,90px); line-height:1; display:block; margin-bottom:3px; }
    .word-emoji.pop { animation:emojiPop .4s cubic-bezier(.34,1.56,.64,1); }
    @keyframes emojiPop { 0%{transform:scale(.4) rotate(-12deg);opacity:.4} 100%{transform:scale(1) rotate(0);opacity:1} }

    .chars-row { display:flex; justify-content:center; flex-wrap:wrap; gap:5px; margin:7px 0 4px; }
    .char-unit { display:flex; flex-direction:column; align-items:center; gap:2px; }
    .char-hira {
      font-size:clamp(1.5rem,4.8vw,2.7rem); font-weight:900;
      width:clamp(46px,8vw,66px); height:clamp(50px,8.5vw,68px);
      display:flex; align-items:center; justify-content:center;
      border-radius:11px; background:#f2f2f2;
      transition:all .22s cubic-bezier(.34,1.56,.64,1);
    }
    .char-hira.active { background:linear-gradient(145deg,#FFE066,#FFD700); transform:scale(1.12) translateY(-5px); box-shadow:0 7px 18px rgba(255,200,0,.5); }
    .char-hira.done   { background:linear-gradient(145deg,#98E88E,#6DC96A); color:#236020; }
    .char-romaji { font-size:.75rem; font-family:'Courier New',monospace; letter-spacing:2px; font-weight:bold; min-height:15px; }
    .r-done { color:#4CAF50; }
    .r-next { color:#e53935; text-decoration:underline; font-size:.88rem; }
    .r-rest { color:#ccc; }

    .key-hint { display:flex; align-items:center; justify-content:center; gap:8px; margin-top:7px; font-size:.95rem; color:#888; }
    .hint-key {
      width:42px; height:42px; display:inline-flex; align-items:center; justify-content:center;
      background:linear-gradient(145deg,#667eea,#764ba2); color:white;
      border-radius:9px; font-size:1.25rem; font-weight:900;
      box-shadow:0 4px 0 #3a4d9e; font-family:'Courier New',monospace;
      animation:hintPulse 1s ease infinite;
    }
    @keyframes hintPulse { 0%,100%{box-shadow:0 4px 0 #3a4d9e} 50%{box-shadow:0 4px 0 #3a4d9e,0 0 14px rgba(102,126,234,.7)} }

    /* XP pop */
    .xp-pop {
      position:fixed; pointer-events:none; z-index:9000;
      font-size:1.8rem; font-weight:900; color:#FFD700;
      text-shadow:2px 2px 0 rgba(0,0,0,.3);
      animation:xpFloat 1.2s ease forwards;
    }
    @keyframes xpFloat { 0%{transform:translateY(0) scale(1);opacity:1} 100%{transform:translateY(-75px) scale(1.3);opacity:0} }

    /* Keyboard */
    .keyboard { background:linear-gradient(145deg,#2d2d2d,#1a1a1a); border-radius:20px; padding:11px 11px 15px; width:100%; box-shadow:0 9px 26px rgba(0,0,0,.3); }
    .kb-row { display:flex; justify-content:center; gap:4px; margin-bottom:4px; }
    .kb-key {
      background:linear-gradient(145deg,#666,#444); color:#eee; border-radius:8px;
      width:clamp(30px,5.8vw,58px); height:clamp(32px,6vw,50px);
      display:flex; align-items:center; justify-content:center;
      font-size:clamp(.7rem,1.9vw,1.1rem); font-weight:bold;
      border-bottom:4px solid #1a1a1a; transition:all .12s;
      user-select:none; font-family:'Courier New',monospace;
    }
    .kb-key.lit { background:linear-gradient(145deg,#FFE066,#FFD700); color:#5a3800; border-bottom-color:#B8860B; transform:scale(1.16) translateY(-3px); box-shadow:0 0 14px rgba(255,215,0,.8); animation:keyGlow .7s ease infinite; }
    @keyframes keyGlow { 0%,100%{box-shadow:0 0 14px rgba(255,215,0,.8)} 50%{box-shadow:0 0 26px rgba(255,215,0,1)} }
    .kb-key.ok { background:linear-gradient(145deg,#98E88E,#6DC96A)!important; color:white!important; transform:translateY(3px) scale(.95); border-bottom-width:1px; }
    .kb-key.ng { animation:keyNg .3s ease; }
    @keyframes keyNg { 0%,100%{transform:none} 30%,70%{transform:translateX(5px);background:linear-gradient(145deg,#FF6B6B,#cc3333);color:white} }

    .word-card.shake { animation:cardShake .25s ease; }
    @keyframes cardShake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-8px)} 75%{transform:translateX(8px)} }
    .word-card.success { animation:cardSuccess .5s ease; }
    @keyframes cardSuccess { 0%{transform:scale(1)} 40%{transform:scale(1.05);box-shadow:0 18px 48px rgba(255,215,0,.5)} 100%{transform:scale(1)} }

    /* ══ COMPLETE ══ */
    .complete-title { font-size:clamp(1.8rem,5vw,2.9rem); font-weight:900; color:#5a3500; text-align:center; text-shadow:2px 2px 0 rgba(255,200,100,.5); animation:bounce 1.2s ease infinite; }
    @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
    .complete-card { background:white; border-radius:24px; padding:24px 36px; text-align:center; width:100%; box-shadow:0 14px 42px rgba(0,0,0,.18); }
    .complete-stars { font-size:2.3rem; letter-spacing:5px; margin-bottom:7px; }
    .complete-msg   { font-size:1.25rem; color:#555; font-weight:bold; margin-bottom:14px; }
    .xp-earned-box  { background:linear-gradient(135deg,#667eea18,#764ba218); border:2px solid #667eea33; border-radius:14px; padding:12px 18px; margin:10px 0; display:flex; align-items:center; justify-content:center; gap:9px; }
    .xp-earned-num  { font-size:1.9rem; font-weight:900; color:#667eea; }
    .xp-earned-lbl  { font-size:.95rem; color:#666; font-weight:bold; }
    .rank-after { display:flex; align-items:center; justify-content:center; gap:10px; font-size:1rem; color:#444; font-weight:bold; margin-top:9px; }
    .rankup-banner { display:none; background:linear-gradient(135deg,#FFD700,#FF6B6B); color:white; font-size:1.2rem; font-weight:900; padding:9px 18px; border-radius:50px; box-shadow:0 5px 18px rgba(255,107,107,.4); animation:rankupPop .5s cubic-bezier(.34,1.56,.64,1); margin:8px 0; }
    .rankup-banner.show { display:block; }
    @keyframes rankupPop { from{transform:scale(0) rotate(-10deg)} to{transform:scale(1) rotate(0)} }

    /* タイマー */
    .timer-row { width:100%; display:flex; align-items:center; justify-content:space-between; padding:0 2px; }
    .timer-disp { font-size:1.15rem; font-weight:900; color:#5a3500; font-family:'Courier New',monospace; background:rgba(90,53,0,.1); padding:4px 12px; border-radius:12px; letter-spacing:1px; }
    .best-disp  { font-size:.82rem; color:#8a6a3a; display:flex; align-items:center; gap:4px; }

    /* おにモードトグル */
    .mode-toggle-btn { width:100%; background:rgba(90,53,0,.1); border:2px solid rgba(90,53,0,.2); border-radius:30px; padding:9px 20px; font-size:1rem; font-weight:bold; color:#5a3500; cursor:pointer; transition:.2s; }
    .mode-toggle-btn:hover { background:rgba(90,53,0,.18); }
    .mode-toggle-btn.oni-on { background:linear-gradient(135deg,#ff4d00,#cc0000); color:white; border-color:#aa1100; box-shadow:0 4px 16px rgba(255,77,0,.4); }
    .lc-oni { position:absolute; inset:0; border-radius:18px; border:3px solid rgba(255,80,0,.7); pointer-events:none; }
    .lc-best { font-size:.76rem; color:rgba(255,255,255,.82); margin-top:5px; }

    /* クリア画面：タイム・記録 */
    .time-result { display:flex; align-items:center; justify-content:center; gap:10px; margin:8px 0 6px; flex-wrap:wrap; }
    .time-taken-box { display:flex; align-items:center; gap:6px; background:rgba(90,53,0,.08); border-radius:12px; padding:6px 14px; font-weight:bold; color:#5a3500; font-size:.95rem; }
    .record-badge { background:linear-gradient(135deg,#FFD700,#FF6B6B); color:white; font-weight:900; padding:6px 14px; border-radius:12px; font-size:.92rem; animation:rankupPop .4s cubic-bezier(.34,1.56,.64,1); }
    .bonus-note { font-size:.8rem; color:#e05000; font-weight:bold; text-align:center; }

    /* Confetti */
    #confetti-layer { position:fixed; inset:0; pointer-events:none; overflow:hidden; z-index:9999; }
    .conf { position:absolute; animation:confFall linear forwards; }
    @keyframes confFall { 0%{transform:translateY(-40px) rotate(0) scale(1);opacity:1} 80%{opacity:1} 100%{transform:translateY(110vh) rotate(720deg) scale(.4);opacity:0} }
  </style>
</head>
<body>

<div id="confetti-layer"></div>

<!-- 終了確認ダイアログ -->
<div class="confirm-overlay" id="confirm-overlay">
  <div class="confirm-box">
    <div class="confirm-icon">🤔</div>
    <div class="confirm-msg">とちゅうでやめる？<br><span style="font-size:.95rem;color:#888">けいけんちはもらえないよ</span></div>
    <div class="confirm-btns">
      <button class="btn btn-cancel" onclick="closeConfirm()">つづける</button>
      <button class="btn" onclick="quitToLevelSelect()">やめる</button>
    </div>
  </div>
</div>

<!-- ═══ START ═══ -->
<div id="start-screen" class="screen active">
  <div class="mascot">⌨️</div>
  <div class="title-big">たのしい タイピング</div>
  <div class="title-sub">キーボードでひらがなをうってみよう！</div>
  <div class="rank-badge">
    <span id="s-rank-icon">🐣</span>
    <span id="s-rank-name">ひよこ</span>
    <span id="s-xp" style="opacity:.7;font-size:.88rem"></span>
  </div>
  <button class="btn" onclick="showScreen('level-screen')">🎮 はじめる！</button>
</div>

<!-- ═══ LEVEL SELECT ═══ -->
<div id="level-screen" class="screen">
  <div class="title-big" style="font-size:clamp(1.5rem,4vw,2.2rem)">レベルをえらんでね！</div>
  <div class="xp-panel">
    <span class="xp-rank-icon" id="ls-icon">🐣</span>
    <div class="xp-rank-info">
      <div class="xp-rank-name" id="ls-name">ひよこ</div>
      <div class="xp-total" id="ls-xp">0 XP</div>
    </div>
    <div class="xp-bar-wrap">
      <div class="xp-bar-bg"><div class="xp-bar-fill" id="ls-fill" style="width:0%"></div></div>
      <div class="xp-bar-label" id="ls-label">あと ? XP</div>
    </div>
  </div>
  <button class="mode-toggle-btn" id="mode-toggle" onclick="toggleOni()">👹 おにモード OFF（キーボードひょうじあり）</button>
  <div class="level-grid" id="level-grid"></div>
  <button class="btn btn-ghost" onclick="showScreen('start-screen')">← もどる</button>
</div>

<!-- ═══ GAME ═══ -->
<div id="game-screen" class="screen">
  <div class="top-bar">
    <button class="back-btn" onclick="confirmQuit()">← やめる</button>
    <div class="stars-row" id="stars-row">☆☆☆☆☆</div>
    <button class="mute-btn" id="mute-btn" onclick="toggleMute()" title="BGMのオン/オフ">🔊</button>
    <div class="word-count" id="word-count">1 / 8</div>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
  <div class="timer-row">
    <span class="timer-disp">⏱ <span id="timer-disp">0:00</span></span>
    <span class="best-disp">🏆 <span id="best-disp">--:--</span></span>
  </div>
  <div class="xp-mini">
    <span class="xp-mini-icon" id="g-icon">🐣</span>
    <div class="xp-mini-bg"><div class="xp-mini-fill" id="g-fill" style="width:0%"></div></div>
    <span class="xp-mini-lbl" id="g-lbl">0 XP</span>
  </div>
  <div class="word-card" id="word-card">
    <span class="word-emoji" id="word-emoji">🐕</span>
    <div class="chars-row" id="chars-row"></div>
    <div class="key-hint">
      <span>つぎは</span>
      <span class="hint-key" id="hint-key">A</span>
      <span>をおしてね！</span>
    </div>
  </div>
  <div class="keyboard" id="keyboard"></div>
</div>

<!-- ═══ COMPLETE ═══ -->
<div id="complete-screen" class="screen">
  <div class="complete-title">🎉 やったー！ 🎉</div>
  <div class="mascot" style="animation-duration:2s" id="c-mascot">🌟</div>
  <div class="complete-card">
    <div class="complete-stars" id="c-stars">⭐⭐⭐⭐⭐</div>
    <div class="complete-msg"   id="c-msg">かんぺき！</div>
    <div class="time-result">
      <div class="time-taken-box">⏱ <span id="c-time">0:00</span></div>
      <div class="record-badge" id="c-record" style="display:none">🏆 しんきろく！</div>
    </div>
    <div class="bonus-note" id="c-bonus-note" style="display:none"></div>
    <div class="xp-earned-box">
      <span class="xp-earned-num" id="c-xp-num">+0</span>
      <span class="xp-earned-lbl">XP かくとく！</span>
    </div>
    <div class="rankup-banner" id="c-rankup">🎊 ランクアップ！</div>
    <div class="rank-after">
      <span id="c-rank-icon">🐣</span>
      <span id="c-rank-name">ひよこ</span>
      <span id="c-rank-xp" style="color:#aaa;font-size:.85rem"></span>
    </div>
    <div class="xp-bar-bg" style="margin-top:8px">
      <div class="xp-bar-fill" id="c-xp-fill" style="width:0%"></div>
    </div>
  </div>
  <div style="display:flex;gap:10px;flex-wrap:wrap;justify-content:center">
    <button class="btn btn-ghost" onclick="showScreen('level-screen')">📚 レベルえらぶ</button>
    <button class="btn" style="background:linear-gradient(145deg,#98E88E,#6DC96A);box-shadow:0 8px 0 #3a8c36;color:#1a4a18" onclick="replayLevel()">🔄 もういちど！</button>
  </div>
</div>

<script>
/* ═══ ROMAJI MAP ═══ */
const RMAP = {
  'あ':'a','い':'i','う':'u','え':'e','お':'o',
  'か':'ka','き':'ki','く':'ku','け':'ke','こ':'ko',

/* ═══ KANA PARSER (handles compound kana 拗音) ═══ */
const SMALL_KANA = new Set(['ぁ','ぃ','ぅ','ぇ','ぉ','ゃ','ゅ','ょ']);
function parseKana(h) {
  const chars = [...h], units = [];
  for (let i = 0; i < chars.length; i++) {
    if (i + 1 < chars.length && SMALL_KANA.has(chars[i+1])) {
      const pair = chars[i] + chars[i+1];
      units.push({ kana: pair, romaji: RMAP[pair] || '?' });
      i++;
    } else {
      units.push({ kana: chars[i], romaji: RMAP[chars[i]] || '?' });
    }
  }
  return units;
}

function getXpProg(xp) {
  const idx = RANKS.findIndex(r => r.xp > xp);
  if (idx === -1) return { pct:100, toNext:0, nextName:'' };
  const cur = RANKS[idx-1].xp, next = RANKS[idx].xp;
  return { pct:((xp-cur)/(next-cur))*100, toNext:next-xp, nextName:RANKS[idx].name };
}

const Timer = {

  start() { this._t = Date.now(); clearInterval(this._id); this._id = setInterval(()=>this._tick(), 200); },
  stop()  { clearInterval(this._id); const s=this._t?(Date.now()-this._t)/1000:0; this._t=null; return s; },
  reset() { clearInterval(this._id); this._t=null; const el=document.getElementById('timer-disp'); if(el) el.textContent='0:00'; },

function tone(f,d,type='sine',vol=0.22) {
  if(!audioCtx) return;
  const o=audioCtx.createOscillator(), g=audioCtx.createGain();
  o.connect(g); g.connect(audioCtx.destination); o.type=type; o.frequency.value=f;
  g.gain.setValueAtTime(vol,audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+d);
  o.start(); o.stop(audioCtx.currentTime+d);
}

/* ═══ BGM ═══ */
// レベルごとのBPM（高レベルほど速くなる）
const LEVEL_BPM = { 1:100, 2:112, 3:126, 4:140, 5:156 };

const BGM = (() => {
  let playing = false, muted = false;
  let masterGain = null, nextLoopTime = 0, loopId = null;
  let _bpm = 126, _e, _q, _h;
  let _noiseBuffer = null;

  const F = {
    C3:130.8, D3:146.8, E3:164.8, F3:174.6, G3:196.0, A3:220.0,
    C4:261.6, D4:293.7, E4:329.6, F4:349.2, G4:392.0, A4:440.0,
    C5:523.3, D5:587.3, E5:659.3, F5:698.5, G5:784.0, A5:880.0,
  };

  function calc(bpm) {
    _bpm = bpm; _e = 60/(bpm*2); _q = _e*2; _h = _q*2;
  }

  // ノイズバッファ（ハイハット用）を一度だけ生成
  function noiseBuf() {
    if (_noiseBuffer) return _noiseBuffer;
    _noiseBuffer = audioCtx.createBuffer(1, ~~(audioCtx.sampleRate*.06), audioCtx.sampleRate);
    const d = _noiseBuffer.getChannelData(0);
    for (let i=0; i<d.length; i++) d[i] = Math.random()*2-1;
    return _noiseBuffer;
  }

  function note(freq, dur, type, vol, when) {
    if (!freq || !audioCtx || !masterGain) return;
    const o = audioCtx.createOscillator(), g = audioCtx.createGain();
    o.connect(g); g.connect(masterGain);
    o.type = type; o.frequency.value = freq;
    g.gain.setValueAtTime(0, when);
    g.gain.linearRampToValueAtTime(vol, when + 0.015);
    g.gain.setValueAtTime(vol, when + dur * 0.72);
    g.gain.exponentialRampToValueAtTime(0.0001, when + dur);
    o.start(when); o.stop(when + dur + 0.01);
  }

  function kick(when) {
    if (!audioCtx || !masterGain) return;
    const o = audioCtx.createOscillator(), g = audioCtx.createGain();
    o.connect(g); g.connect(masterGain);
    o.type = 'sine';
    o.frequency.setValueAtTime(130, when);
    o.frequency.exponentialRampToValueAtTime(38, when + 0.14);
    g.gain.setValueAtTime(0.18, when);
    g.gain.exponentialRampToValueAtTime(0.0001, when + 0.2);
    o.start(when); o.stop(when + 0.22);
  }

  function hat(when) {
    if (!audioCtx || !masterGain) return;
    const src = audioCtx.createBufferSource();
    src.buffer = noiseBuf();
    const fl = audioCtx.createBiquadFilter(), g = audioCtx.createGain();
    fl.type = 'highpass'; fl.frequency.value = 8000;
    src.connect(fl); fl.connect(g); g.connect(masterGain);
    g.gain.setValueAtTime(0.028, when);
    g.gain.exponentialRampToValueAtTime(0.0001, when + 0.05);
    src.start(when);
  }

  function scheduleLoop(start) {
    const e=_e, q=_q, h=_h;

    // ── メロディ (三角波・柔らかい音色) ──
    // Cメジャー 4小節ループ
    const mel = [
      [F.E5,e],[F.G5,e],[F.E5,e],[F.C5,e], [F.D5,e],[F.E5,e],[F.D5,e],[0,  e],
      [F.G5,e],[F.A5,e],[F.G5,e],[F.E5,e], [F.D5,q],         [F.C5,q],
      [F.C5,e],[F.E5,e],[F.G5,q],          [F.A5,e],[F.G5,e],[F.E5,q],
      [F.F5,e],[F.E5,e],[F.D5,e],[F.C5,e], [F.C5,h],
    ];
    let t = start;
    mel.forEach(([f,d]) => { note(f, d*.82, 'triangle', 0.085, t); t += d; });
    const loopDur = t - start;

    // ── ベース (サイン波) ──
    const bass = [
      [F.C3,q],[F.G3,q],[F.C3,q],[F.G3,q],
      [F.G3,q],[F.D3,q],[F.G3,q],[F.D3,q],
      [F.C3,q],[F.E3,q],[F.G3,q],[F.C3,q],
      [F.F3,q],[F.G3,q],[F.C3,h],
    ];
    t = start;
    bass.forEach(([f,d]) => { note(f, d*.68, 'sine', 0.065, t); t += d; });

    // ── リズム (4小節分) ──
    for (let bar=0; bar<4; bar++) {
      const b0 = start + bar * q * 4;
      kick(b0);          // 1拍目キック
      kick(b0 + q*2);    // 3拍目キック
      for (let beat=0; beat<4; beat++) {
        hat(b0 + beat*q);        // 表拍ハイハット
        hat(b0 + beat*q + e);    // 裏拍ハイハット
      }
    }

    return loopDur;
  }

  function tick() {
    if (!playing) return;
    if (audioCtx && nextLoopTime < audioCtx.currentTime + 0.18) {
      nextLoopTime += scheduleLoop(nextLoopTime);
    }
    loopId = setTimeout(tick, 50);
  }

  return {
    start(bpm = 126) {
      if (!audioCtx) return;
      calc(bpm);
      if (playing) return; // BPM変更は次のループから
      playing = true;
      masterGain = audioCtx.createGain();
      masterGain.gain.value = muted ? 0 : 0.42;
      masterGain.connect(audioCtx.destination);
      nextLoopTime = audioCtx.currentTime + 0.05;
      tick();
    },
    stop() {
      playing = false;
      clearTimeout(loopId);
      if (masterGain) {
        try {
          masterGain.gain.setValueAtTime(masterGain.gain.value, audioCtx.currentTime);
          masterGain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.5);
        } catch(_) {}
        setTimeout(() => { try { masterGain.disconnect(); } catch(_) {} masterGain = null; }, 600);
      }
    },
    toggleMute() {
      muted = !muted;
      if (masterGain) masterGain.gain.setTargetAtTime(muted ? 0 : 0.42, audioCtx.currentTime, 0.08);
      return muted;
    },
    get isPlaying() { return playing; },
  };
})();

function toggleMute() {
  const m = BGM.toggleMute();
  document.getElementById('mute-btn').textContent = m ? '🔇' : '🔊';
}

function toggleOni() {
  oniMode = !oniMode;
  const btn = document.getElementById('mode-toggle');
  btn.textContent = oniMode
    ? '👹 おにモード ON（キーボードひょうじなし）'
    : '👹 おにモード OFF（キーボードひょうじあり）';
  btn.className = 'mode-toggle-btn' + (oniMode ? ' oni-on' : '');
  buildLevelGrid();
}

/* ═══ LEVEL GRID ═══ */
function buildLevelGrid() {
  const grid=document.getElementById('level-grid'); grid.innerHTML='';
  for (let lv=1; lv<=5; lv++) {
    const cfg=LEVEL_CFG[lv];
    const xpBase = cfg.xp * (oniMode ? 2 : 1);
    const xpMax  = Math.round(xpBase * 1.5);
    const best   = DATA.getBest(lv, oniMode);
    const bestStr = best ? `🏆 ${fmtTime(best)}` : '🏆 --:--';
    const btn=document.createElement('button'); btn.className=`level-card ${cfg.color}`;
    btn.innerHTML=`
      <div class="lc-num">Lv.${lv}</div>
      <div class="lc-name">${cfg.icon} ${cfg.name}${oniMode?' 👹':''}</div>
      <div class="lc-stars">${cfg.stars}</div>
      <div class="lc-info">${cfg.count}もん ／ ${xpBase}〜${xpMax} XP／もん</div>
      <div class="lc-best">${bestStr}</div>
      ${oniMode?'<div class="lc-oni"></div>':''}
    `;
    btn.onclick=()=>startGame(lv);
    grid.appendChild(btn);
  }
}

/* ═══ GAME ═══ */
function startGame(lv) {
  currentLevel=lv;
  const cfg=LEVEL_CFG[lv];
  wordList=[...WORD_LEVELS[lv]].sort(()=>Math.random()-.5).slice(0,cfg.count);
  wIdx=0; roundXP=0; totalMistakes=0;
  buildKeyboard(); updateXPBars();
  document.getElementById('stars-row').textContent='☆☆☆☆☆';
  document.getElementById('mute-btn').textContent = '🔊';
  // おにモード: キーボード・ヒントの表示/非表示
  document.getElementById('keyboard').style.display = oniMode ? 'none' : '';
  // ベストタイム表示
  const best = DATA.getBest(lv, oniMode);
  document.getElementById('best-disp').textContent = best ? fmtTime(best) : '--:--';
  // タイマーリセット
  Timer.reset();
  loadWord();
  showScreen('game-screen');
  Timer.start();
  initAudio();
  BGM.stop();
  setTimeout(() => BGM.start(LEVEL_BPM[lv]), 100);
}
function replayLevel() { startGame(currentLevel); }

function loadWord() {
  const w=wordList[wIdx];
  const em=document.getElementById('word-emoji');
  em.textContent=w.e; em.classList.remove('pop'); void em.offsetWidth; em.classList.add('pop');
  units=parseKana(w.h); uIdx=0; rPos=0; wordMistakes=0;
  updateProgress(); renderWord();
}

function updateProgress() {
  const pct=wIdx/wordList.length*100;
  document.getElementById('progress-fill').style.width=pct+'%';
  document.getElementById('word-count').textContent=`${wIdx+1} / ${wordList.length}`;
  const filled=Math.round((wIdx/wordList.length)*5);
  document.getElementById('stars-row').textContent='⭐'.repeat(filled)+'☆'.repeat(5-filled);
}

function renderWord() {
  const row=document.getElementById('chars-row'); row.innerHTML='';
  units.forEach((u,i)=>{
    const unit=document.createElement('div'); unit.className='char-unit';
    const hDiv=document.createElement('div');
    hDiv.className='char-hira'+(i<uIdx?' done':i===uIdx?' active':'');
    hDiv.textContent=u.kana;
    const rDiv=document.createElement('div'); rDiv.className='char-romaji';
    if (i<uIdx) {
      rDiv.innerHTML=`<span class="r-done">${u.romaji}</span>`;
    } else if (i===uIdx) {
      const d=u.romaji.slice(0,rPos), nx=u.romaji[rPos]||'', rest=u.romaji.slice(rPos+1);
      rDiv.innerHTML=`<span class="r-done">${d}</span><span class="r-next">${nx}</span><span class="r-rest">${rest}</span>`;
    } else {
      rDiv.innerHTML=`<span class="r-rest">${u.romaji}</span>`;
    }
    unit.appendChild(hDiv); unit.appendChild(rDiv); row.appendChild(unit);
  });
  // おにモードではヒントキー・キーボードハイライトを非表示
  const keyHint = document.querySelector('.key-hint');
  if (keyHint) keyHint.style.display = oniMode ? 'none' : '';
  if (uIdx<units.length && !oniMode) {
    const nk=units[uIdx].romaji[rPos]||'';
    document.getElementById('hint-key').textContent=nk.toUpperCase();
    setHighlight(nk);
  }
}

function onInput(key) {
  initAudio();
  if (uIdx>=units.length) return;
  const expected=units[uIdx].romaji[rPos];
  if (key.toLowerCase()===expected.toLowerCase()) {
    sfxKey(); flashKey(key,'ok'); rPos++;
    if (rPos>=units[uIdx].romaji.length) { uIdx++; rPos=0; if (uIdx>=units.length) { onWordDone(); return; } }
    renderWord();
  } else {
    sfxWrong(); flashKey(key,'ng'); wordMistakes++; totalMistakes++;
    const card=document.getElementById('word-card');
    card.classList.remove('shake'); void card.offsetWidth; card.classList.add('shake');
    setTimeout(()=>card.classList.remove('shake'),300);
  }
}

function onWordDone() {
  const cfg=LEVEL_CFG[currentLevel];
  let xpGain = wordMistakes===0 ? Math.round(cfg.xp*1.5) : cfg.xp;
  if (oniMode) xpGain *= 2; // おにモードは2倍
  roundXP+=xpGain; sfxWord(); confetti(16); showXPPop(xpGain);
  const card=document.getElementById('word-card');
  card.classList.add('success'); setTimeout(()=>card.classList.remove('success'),500);
  setTimeout(()=>{ wIdx++; if(wIdx>=wordList.length) onGameComplete(); else loadWord(); },1100);
}

function showXPPop(xp) {
  const el=document.createElement('div'); el.className='xp-pop';
  el.textContent=`+${xp} XP`;
  el.style.left=(25+Math.random()*50)+'%'; el.style.top='32%';
  document.body.appendChild(el); setTimeout(()=>el.remove(),1400);
}

function onGameComplete() {
  // タイマー停止・記録チェック
  gameTimeSec = Timer.stop();
  const prevBest = DATA.getBest(currentLevel, oniMode);
  const isRecord = prevBest === null || gameTimeSec < prevBest;
  if (isRecord) DATA.setBest(currentLevel, oniMode, gameTimeSec);

  // 記録更新ボーナス
  const cfg=LEVEL_CFG[currentLevel];
  let recordBonus = 0;
  if (isRecord && prevBest !== null) {
    recordBonus = cfg.xp * (oniMode ? 4 : 2); // 記録更新ボーナス
    if (oniMode) recordBonus *= 2;
    roundXP += recordBonus;
  }

  const prevXP=getXP(), prevRank=getRank(prevXP);
  const newXP=prevXP+roundXP; setXP(newXP);
  const newRank=getRank(newXP), prog=getXpProg(newXP);
  BGM.stop();
  setTimeout(() => sfxEnd(), 400);
  confetti(55);

  // stars based on mistakes
  const stars = totalMistakes===0?5:totalMistakes<=3?4:totalMistakes<=7?3:totalMistakes<=12?2:1;
  document.getElementById('c-stars').textContent='⭐'.repeat(stars)+'☆'.repeat(5-stars);
  const msgs=['','もういちどやってみよう！','がんばったね！💪','よくできました！⭐','すごい！ほぼかんぺき！✨','かんぺき！ぜんもんせいかい！🎊'];
  document.getElementById('c-msg').textContent=msgs[stars];

  // タイム表示・記録バッジ
  document.getElementById('c-time').textContent = fmtTime(gameTimeSec);
  const recEl = document.getElementById('c-record');
  const bonusEl = document.getElementById('c-bonus-note');
  if (isRecord && prevBest === null) {
    recEl.textContent='🏆 はじめての きろく！'; recEl.style.display='';
    bonusEl.style.display='none';
  } else if (isRecord) {
    recEl.textContent='🏆 しんきろく！'; recEl.style.display='';
    bonusEl.textContent=`きろくこうしん ボーナス +${recordBonus} XP！`; bonusEl.style.display='';
    confetti(30);
  } else {
    recEl.style.display='none';
    bonusEl.style.display='none';
  }

  document.getElementById('c-xp-num').textContent='+'+roundXP;
  document.getElementById('c-rank-icon').textContent=newRank.icon;
  document.getElementById('c-rank-name').textContent=newRank.name;
  document.getElementById('c-rank-xp').textContent=newXP+' XP';
  document.getElementById('c-xp-fill').style.width=prog.pct+'%';
  document.getElementById('c-mascot').textContent=newRank.icon;

  const banner=document.getElementById('c-rankup');
  if (newRank.name!==prevRank.name) {
    banner.textContent=`🎊 ${newRank.icon} ${newRank.name} にランクアップ！`;
    banner.classList.add('show'); confetti(35);
  } else { banner.classList.remove('show'); }

  setTimeout(()=>showScreen('complete-screen'),1600);
}

/* ═══ CONFETTI ═══ */
function confetti(n) {
  const layer=document.getElementById('confetti-layer');
  const colors=['#FF6B6B','#FFD700','#90EE90','#87CEEB','#DDA0DD','#FF8C69','#7FFFD4'];
  for(let i=0;i<n;i++){
    const el=document.createElement('div'); el.className='conf';
    const size=Math.random()*11+5;
    el.style.cssText=`left:${Math.random()*100}vw;width:${size}px;height:${size}px;background:${colors[~~(Math.random()*colors.length)]};border-radius:${Math.random()>.5?'50%':'4px'};animation-duration:${Math.random()*1.8+1.4}s;animation-delay:${Math.random()*.7}s;`;
    layer.appendChild(el); setTimeout(()=>el.remove(),4000);
  }
}

/* ═══ QUIT ═══ */
function confirmQuit() {
  document.getElementById('confirm-overlay').classList.add('show');
}
function closeConfirm() {
  document.getElementById('confirm-overlay').classList.remove('show');
}
function quitToLevelSelect() {
  closeConfirm();
  BGM.stop();
  showScreen('level-screen');
}

/* ═══ KEY EVENT ═══ */
document.addEventListener('keydown',e=>{
  if(e.ctrlKey||e.altKey||e.metaKey||e.repeat) return;
  if(/^[a-zA-Z]$/.test(e.key)) onInput(e.key);
});

/* ═══ INIT ═══ */
buildLevelGrid();
updateXPBars();
</script>
</body>
</html>
